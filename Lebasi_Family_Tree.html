<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lebasi Family Tree</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0705;
    color: #e8d5b0;
    font-family: 'Crimson Text', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 24px;
    background: linear-gradient(to bottom, rgba(10,7,5,0.98), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: #c9a84c;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #8a7a5a;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .stats {
    display: flex;
    gap: 24px;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: #8a7a5a;
    letter-spacing: 1px;
  }

  .stats span { color: #c9a84c; }

  #controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 8px;
    background: rgba(20,15,10,0.9);
    border: 1px solid #3a2e1e;
    border-radius: 30px;
    padding: 8px 16px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: #8a7a5a;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 20px;
    transition: all 0.2s;
  }

  .ctrl-btn:hover { background: #2a1e10; color: #c9a84c; }

  #search-box {
    position: fixed;
    top: 70px;
    right: 24px;
    z-index: 100;
  }

  #search {
    background: rgba(20,15,10,0.9);
    border: 1px solid #3a2e1e;
    border-radius: 20px;
    color: #e8d5b0;
    font-family: 'Crimson Text', serif;
    font-size: 1rem;
    padding: 6px 16px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: #c9a84c; }
  #search::placeholder { color: #5a4a3a; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    background: rgba(15,10,5,0.97);
    border: 1px solid #c9a84c;
    border-radius: 4px;
    padding: 12px 16px;
    max-width: 240px;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }

  .tt-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: #c9a84c;
    margin-bottom: 6px;
  }

  .tt-row {
    font-size: 0.85rem;
    color: #8a7a5a;
    line-height: 1.6;
  }

  .tt-row span { color: #e8d5b0; }

  #svg-container {
    width: 100vw;
    height: 100vh;
  }

  .node circle {
    stroke-width: 1.5;
    transition: r 0.2s, filter 0.2s;
    cursor: pointer;
  }

  .node circle:hover {
    filter: brightness(1.4);
  }

  .node text {
    font-family: 'Crimson Text', serif;
    font-size: 11px;
    fill: #e8d5b0;
    pointer-events: none;
    text-anchor: middle;
  }

  .node text.year {
    font-size: 9px;
    fill: #8a7a5a;
  }

  .link {
    fill: none;
    stroke: #3a2e1e;
    stroke-width: 1;
    opacity: 0.6;
  }

  .link.highlight { stroke: #c9a84c; stroke-width: 2; opacity: 1; }
  .node.highlight circle { filter: brightness(1.8) drop-shadow(0 0 6px #c9a84c); }
  .node.dimmed { opacity: 0.15; }

  #legend {
    position: fixed;
    bottom: 70px;
    left: 24px;
    z-index: 100;
    font-size: 0.75rem;
    color: #5a4a3a;
  }

  .leg { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>Lebasi Family Tree</h1>

<div id="search-box">

</div>

<div id="tooltip">

  <div class="tt-row">Place: <span id="tt-place"></span></div>
  <div class="tt-row" id="tt-death-row">Died: <span id="tt-died"></span></div>
  <div class="tt-row" id="tt-sex-row">Sex: <span id="tt-sex"></span></div>
</div>

<svg id="svg-container"></svg>

<div id="controls">
  <button class="ctrl-btn" onclick="resetZoom()">⌂ Reset</button>
  <button class="ctrl-btn" onclick="zoomIn()">+ Zoom In</button>
  <button class="ctrl-btn" onclick="zoomOut()">− Zoom Out</button>
  <button class="ctrl-btn" onclick="focusPaolos()">★ Focus: Paolos</button>
</div>

<div id="legend">

  <div class="leg"><div class="leg-dot" style="background:#7a6a4a"></div> Unknown</div>
</div>

// Build nodes and links
const nodes = [];
const links = [];
const nodeMap = {};

// Filter out unnamed/unknown
const validIds = new Set(Object.keys(DATA.individuals).filter(id => {
  const n = DATA.individuals[id].name;
  return n && n !== '?' && n !== '----' && n !== '-----';
}));

validIds.forEach(id => {
  const p = DATA.individuals[id];
  const node = { id, ...p };
  nodes.push(node);
  nodeMap[id] = node;
});

Object.values(DATA.families).forEach(fam => {
  const parentId = fam.husband || fam.wife;
  if (!parentId || !validIds.has(parentId)) return;
  fam.children.forEach(childId => {
    if (validIds.has(childId)) {
      links.push({ source: parentId, target: childId });
    }
  });
  if (fam.husband && fam.wife && validIds.has(fam.husband) && validIds.has(fam.wife)) {
    links.push({ source: fam.husband, target: fam.wife, type: 'spouse' });
  }
});

const svg = d3.select('#svg-container');
const W = window.innerWidth, H = window.innerHeight;
svg.attr('width', W).attr('height', H);

const g = svg.append('g');

const zoom = d3.zoom().scaleExtent([0.05, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

const colorM = '#4a8fc4', colorF = '#c46a8f', colorU = '#7a6a4a';
const getColor = d => d.sex === 'M' ? colorM : d.sex === 'F' ? colorF : colorU;

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.type === 'spouse' ? 40 : 70).strength(d => d.type === 'spouse' ? 0.8 : 0.5))
  .force('charge', d3.forceManyBody().strength(-120))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide(22));

const link = g.append('g').selectAll('line')
  .data(links).join('line')
  .attr('class', 'link')
  .attr('stroke-dasharray', d => d.type === 'spouse' ? '3,3' : null);

const node = g.append('g').selectAll('g')
  .data(nodes).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end', (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

node.append('circle')
  .attr('r', d => d.id === 'I1' ? 12 : 8)
  .attr('fill', d => getColor(d))
  .attr('fill-opacity', 0.85)
  .attr('stroke', d => d.id === 'I1' ? '#c9a84c' : d3.color(getColor(d)).brighter(0.5))
  .attr('stroke-width', d => d.id === 'I1' ? 2.5 : 1);

node.append('text')
  .attr('dy', 20)
  .text(d => {
    const parts = d.name.split(' ');
    return parts[0].length > 10 ? parts[0].substring(0,9)+'…' : parts[0];
  });

node.append('text')
  .attr('class', 'year')
  .attr('dy', 30)
  .text(d => d.birth_date ? d.birth_date.replace(/[A-Z]{3,}\s/,'').substring(0,4) : '');

// Tooltip
const tt = document.getElementById('tooltip');
node.on('mouseover', (e, d) => {
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-born').textContent = d.birth_date || '—';
  document.getElementById('tt-place').textContent = d.birth_place || '—';
  document.getElementById('tt-died').textContent = d.death_date || '—';
  document.getElementById('tt-sex').textContent = d.sex === 'M' ? 'Male' : d.sex === 'F' ? 'Female' : '—';
  tt.style.display = 'block';
  tt.style.left = (e.clientX + 12) + 'px';
  tt.style.top = (e.clientY - 10) + 'px';
})
.on('mousemove', e => {
  tt.style.left = (e.clientX + 12) + 'px';
  tt.style.top = (e.clientY - 10) + 'px';
})
.on('mouseout', () => { tt.style.display = 'none'; });

sim.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    node.classed('dimmed', false).classed('highlight', false);
    link.classed('highlight', false);
    return;
  }
  const matches = new Set(nodes.filter(n => n.name.toLowerCase().includes(q)).map(n => n.id));
  node.classed('highlight', d => matches.has(d.id));
  node.classed('dimmed', d => !matches.has(d.id));
});

// Controls
function resetZoom() { svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(0.6)); }
function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.4); }
function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); }
function focusPaolos() {
  const p = nodes.find(n => n.id === 'I1');
  if (!p) return;
  svg.transition().duration(800).call(zoom.transform,
    d3.zoomIdentity.translate(W/2 - p.x * 1.5, H/2 - p.y * 1.5).scale(1.5));
}

// Initial zoom
setTimeout(() => resetZoom(), 500);
</script>
</body>
</html>
